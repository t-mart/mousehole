name: Cut Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # Required to create a release

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" --notes "[changelog](https://github.com/t-mart/mousehole/blob/master/CHANGELOG.md)"
