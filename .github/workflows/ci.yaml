name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun check-types
      - run: bun lint
      - run: bun test
      
      # Informational only for now — failures here must not fail the build.
      - run: bun dead-code
        continue-on-error: true
      - run: bun dupes
        continue-on-error: true
      - run: bun health
        continue-on-error: true
